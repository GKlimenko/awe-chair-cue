<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#45d5b4" />
    <meta name="application-name" content="AWE 2026" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="AWE 2026" />
    <meta name="msapplication-TileColor" content="#090b0f" />
    <meta name="msapplication-TileImage" content="/icon-144.png" />
    <meta property="og:title" content="AWE 2026" />
    <meta property="og:image" content="/icon-512.png" />
    <title>AWE 2026</title>
    <link rel="manifest" href="/manifest.json" />
    <link rel="alternate manifest" href="/manifest.webmanifest" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icon-32.png" />
    <link rel="icon" type="image/png" sizes="48x48" href="/icon-48.png" />
    <link rel="icon" type="image/png" sizes="96x96" href="/icon-96.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icon-180.png" />
    <link rel="stylesheet" href="./styles.css?v=22" />
  </head>
  <body>
    <main class="app" aria-label="AWE attendee guide">
      <section class="status-bar" aria-live="polite">
        <span id="clock">--:--</span>
        <span id="session-count">Loading</span>
      </section>

      <section class="track-menu" id="track-menu" aria-label="Select a track">
        <p class="kicker">Choose Track</p>
        <h1>AWE 2026</h1>
        <div class="track-list" id="track-list"></div>
      </section>

      <section class="cue-panel hidden" id="session-view" aria-live="polite">
        <p class="kicker" id="track-label">Track</p>
        <h1 id="talk-title">Loading agenda...</h1>
        <p class="speaker" id="speaker-name"></p>
        <p class="room" id="room-name"></p>
      </section>

      <section class="timer-panel hidden" id="description-panel">
        <div class="timer-ring" aria-label="Time remaining">
          <span id="time-remaining">--</span>
        </div>
        <div class="session-meta">
          <p id="session-time">--</p>
          <p id="session-place">--</p>
        </div>
      </section>

      <nav class="controls hidden" id="controls" aria-label="App controls">
        <button id="prev-button" type="button" aria-label="Previous agenda item">Prev</button>
        <button id="description-button" type="button">Info</button>
        <button id="menu-button" type="button">Menu</button>
        <button id="next-button" type="button" aria-label="Next agenda item">Next</button>
      </nav>

      <section class="description-view hidden" id="description-view" aria-live="polite">
        <p class="kicker" id="description-label">Description</p>
        <p id="description-full">Preparing description.</p>
      </section>

      <nav class="controls hidden" id="description-controls" aria-label="Description controls">
        <button id="description-back-button" type="button">Back</button>
        <button id="description-menu-button" type="button">Menu</button>
        <button id="description-next-button" type="button">Next</button>
      </nav>
    </main>

    <script src="./app.js?v=22"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/service-worker.js");
        });
      }
    </script>
  </body>
</html>
